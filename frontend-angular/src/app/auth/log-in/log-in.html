<div class="login-container">

    <!-- LADO IZQUIERDO -->
    <div class="left">

        <!-- IMAGEN -->
        <img src="assets/img/mascotas-login.png" class="mascotas-img" alt="Mascotas">

        <!-- TEXTO ENCIMA -->
        <div class="overlay">
            <h1>HelpYourPet</h1>
            <p>Cuidamos a quienes más amas</p>
        </div>

    </div>

    <!-- LINEA DIVISORA -->
    <div class="vertical-divider"></div>

    <!-- LADO DERECHO -->
    <div class="right">

        <div class="form-box">

            <div class="titulo">Iniciar sesión</div>

            <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
                <input 
                    type="email" 
                    name="correo"
                    [(ngModel)]="credentials.correo"
                    placeholder="Correo electrónico o celular"
                    required
                    email>
                
                <input 
                    [type]="showPassword ? 'text' : 'password'"
                    name="password"
                    [(ngModel)]="credentials.contrasena"
                    placeholder="Contraseña"
                    required>

                <button type="submit" class="login-btn" [disabled]="!loginForm.valid || loading">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                    {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
                </button>
            </form>

            <p class="forgot" routerLink="/recovery">¿Olvidaste tu contraseña?</p>

            <div class="divider"></div>

            <button class="register-btn" routerLink="/register">
                Crear cuenta nueva
            </button>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>&copy; 2024 Helpyourpet - Todos los derechos reservados</p>
    </div>

</div>
