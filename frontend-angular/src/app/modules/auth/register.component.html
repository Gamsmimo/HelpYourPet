<div class="background-container">
  <img src="assets/img/fondo-registrar.jpg" alt="Fondo decorativo" class="background-image" />
</div>

<div class="blur-container">
  <h2 class="form-title">Crear Cuenta</h2>
  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
    <div class="form-grid">
      <div class="form-group">
        <label for="nombres">Nombres</label>
        <input type="text" id="nombres" name="nombres" [(ngModel)]="formData.nombre" required />
      </div>

      <div class="form-group">
        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" name="apellidos" [(ngModel)]="formData.apellidos" required />
      </div>

      <div class="form-group">
        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo" [(ngModel)]="formData.correo" required />
      </div>

      <div class="form-group">
        <label for="tipoDocumento">Tipo de Documento</label>
        <select id="tipoDocumento" name="tipoDocumento" [(ngModel)]="tipoDocumento" required>
          <option value="">Selecciona tu tipo de documento</option>
          <option value="Cédula">Cédula</option>
          <option value="DNI">DNI</option>
          <option value="Pasaporte">Pasaporte</option>
          <option value="Tarjeta de Identidad">Tarjeta de Identidad</option>
          <option value="Cédula de Extranjería">Cédula de Extranjería</option>
          <option value="Permiso de Residencia">Permiso de Residencia</option>
          <option value="Documento Nacional">Documento Nacional</option>
          <option value="Licencia de Conducir">Licencia de Conducir</option>
        </select>
      </div>

      <div class="form-group">
        <label for="numDocumento">N° Documento</label>
        <input type="text" id="numDocumento" name="numDocumento" [(ngModel)]="formData.documento" required />
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" [(ngModel)]="formData.telefono" required />
      </div>

      <div class="form-group">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" name="direccion" [(ngModel)]="formData.direccion" required />
      </div>

      <div class="form-group">
        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad" [(ngModel)]="edad" required min="18" max="120"
          placeholder="Solo mayores de 18 años" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-container">
          <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
            [(ngModel)]="formData.contrasena" required />
          <i class="fas password-toggle" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"
            (click)="togglePassword()"></i>
        </div>
      </div>

      <div class="form-group full-width">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <div class="password-input-container">
          <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword" name="confirmPassword"
            [(ngModel)]="confirmPassword" required />
          <i class="fas password-toggle" [class.fa-eye]="!showConfirmPassword"
            [class.fa-eye-slash]="showConfirmPassword" (click)="toggleConfirmPassword()"></i>
        </div>
      </div>
    </div>

    <div class="terms-section">
      <input type="checkbox" id="acepto" name="acepto" [(ngModel)]="aceptoTerminos" required>
      <label for="acepto">
        Acepto los <a href="#" (click)="showTerms(); $event.preventDefault()">Términos y Condiciones</a>
      </label>
    </div>

    <button type="submit" class="btn-register" [disabled]="!registerForm.valid || loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ loading ? 'Registrando...' : 'Registrarse' }}
    </button>

    <div class="login-text">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </div>
  </form>
</div>
