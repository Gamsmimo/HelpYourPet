<div class="background-container">
  <img src="assets/img/fondoregistro.png" alt="Fondo decorativo" class="background-image" />
</div>

<div class="password-recovery">
  <h2>Recuperar Contraseña</h2>
  <p class="description">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

  <form (ngSubmit)="onSubmit()" #recoveryForm="ngForm">
    <div class="form-group">
      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="tu@email.com">
    </div>

    <button type="submit" [disabled]="!recoveryForm.valid || loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ loading ? 'Enviando...' : 'Enviar Enlace' }}
    </button>
  </form>

  <div class="mt-3 text-center">
    <a routerLink="/login">Volver al inicio de sesión</a>
  </div>
</div>
