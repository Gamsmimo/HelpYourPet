<div class="background-container">
  <img src="assets/img/fondoregistro.png" alt="Fondo decorativo" class="background-image" />
</div>

<div class="password-recovery-container">
  <div class="password-recovery">
    <h2>Restablecer Contraseña</h2>

    <!-- Mostrar error si el token es inválido -->
    <div *ngIf="!tokenValido" class="error-message">
      <p>Token inválido o expirado</p>
      <a routerLink="/recovery" class="login-link">Solicitar nuevo enlace</a>
    </div>

    <!-- Mostrar formulario si el token es válido -->
    <div *ngIf="tokenValido">
      <p class="description">Ingresa tu nueva contraseña a continuación.</p>

      <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
        <div class="form-group">
          <label for="newPassword">Nueva contraseña</label>
          <div class="password-input">
            <input [type]="showNewPassword ? 'text' : 'password'" id="newPassword" name="newPassword"
              [(ngModel)]="newPassword" (ngModelChange)="onPasswordChange()" required placeholder="Mínimo 6 caracteres">
            <i class="toggle-password fas" [class.fa-eye]="!showNewPassword" [class.fa-eye-slash]="showNewPassword"
              (click)="toggleNewPassword()"></i>
          </div>
          <div class="password-strength">
            <div class="strength-bar" [class.active]="passwordStrength >= 1"></div>
            <div class="strength-bar" [class.active]="passwordStrength >= 2"></div>
            <div class="strength-bar" [class.active]="passwordStrength >= 3"></div>
            <div class="strength-bar" [class.active]="passwordStrength >= 4"></div>
          </div>
          <p id="password-strength-text">Seguridad: <span>{{ strengthText }}</span></p>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar nueva contraseña</label>
          <div class="password-input">
            <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword" name="confirmPassword"
              [(ngModel)]="confirmPassword" required placeholder="Repite tu contraseña">
            <i class="toggle-password fas" [class.fa-eye]="!showConfirmPassword"
              [class.fa-eye-slash]="showConfirmPassword" (click)="toggleConfirmPassword()"></i>
          </div>
          <p id="password-match-message" [class.text-success]="passwordsMatch()" [class.text-danger]="!passwordsMatch() && confirmPassword.length > 0">
            <span *ngIf="passwordsMatch()">✓ Las contraseñas coinciden</span>
            <span *ngIf="!passwordsMatch() && confirmPassword.length > 0">✗ Las contraseñas no coinciden</span>
          </p>
        </div>

        <button type="submit" [disabled]="!isFormValid() || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Restableciendo...' : 'Restablecer contraseña' }}
        </button>
      </form>
    </div>
  </div>
</div>
