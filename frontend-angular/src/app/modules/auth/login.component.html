<div class="background-container">
  <img src="assets/img/img1.jpeg" alt="Fondo decorativo" class="background-image" />
</div>

<div class="login-container">
  <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <h2>Iniciar Sesión</h2>
    
    <div class="input-group">
      <label for="correo">Correo</label>
      <input 
        type="email" 
        id="correo" 
        name="correo" 
        [(ngModel)]="credentials.correo"
        placeholder="Ingresa tu correo" 
        required 
        email />
    </div>
    
    <div class="input-group">
      <label for="password">Contraseña</label>
      <div class="password-container">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          id="password" 
          name="password"
          [(ngModel)]="credentials.contrasena"
          placeholder="Ingresa tu contraseña" 
          required />
        <i 
          class="toggle-password fas" 
          [class.fa-eye]="!showPassword"
          [class.fa-eye-slash]="showPassword"
          (click)="togglePassword()"></i>
      </div>
    </div>

    <button type="submit" [disabled]="!loginForm.valid || loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ loading ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <div class="forgot-password">
      <a routerLink="/recovery">¿Olvidaste tu contraseña?</a>
    </div>
  </form>

  <div class="registro">
    ¿No tienes cuenta?
    <a routerLink="/register">Crea tu cuenta</a>
  </div>
</div>
