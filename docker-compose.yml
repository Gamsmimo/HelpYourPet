version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: help-your-pet-postgres
    restart: always
    environment:
      POSTGRES_DB: help_your_pet
      POSTGRES_USER: helppet
      POSTGRES_PASSWORD: helppet123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helppet-network

  redis:
    image: redis:7-alpine
    container_name: help-your-pet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - helppet-network
    command: redis-server --appendonly yes

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: help-your-pet-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@helppet.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - helppet-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  helppet-network:
    driver: bridge