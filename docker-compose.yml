version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: help-your-pet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: help_your_pet
      MYSQL_USER: helppet
      MYSQL_PASSWORD: helppet123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-complete.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - helppet-network

  redis:
    image: redis:7-alpine
    container_name: help-your-pet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - helppet-network
    command: redis-server --appendonly yes

volumes:
  mysql_data:
  redis_data:

networks:
  helppet-network:
    driver: bridge