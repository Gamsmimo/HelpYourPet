<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HelpYourPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/Estilos-Home.css">
    <link rel="icon" href="/img/logo.png" type="image/png">
</head>

<body class="bg-light">
    <!-- Navegación -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <div class="d-flex align-items-center">
                <img src="/img/logo.png" alt="HelpYourPet Logo" class="logo">
                <span class="brand-name">HelpYourPet</span>
            </div>
            <a href="/" class="btn btn-outline-primary">
                <i class="fas fa-home me-2"></i>Volver al Inicio
            </a>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="py-5" style="margin-top: 100px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="fas fa-paw fa-3x text-primary mb-3"></i>
                                <h3>Iniciar Sesión</h3>
                                <p class="text-muted">Bienvenido de vuelta</p>
                            </div>

                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Correo Electrónico</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                        <input type="email" class="form-control" id="email" name="correo" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" class="form-control" id="password" name="contrasena" required>
                                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                                            <i class="fas fa-eye" id="toggleIcon"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label" for="remember">Recordarme</label>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                                    </button>
                                </div>

                                <div class="text-center mt-3">
                                    <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                                </div>

                                <hr class="my-4">

                                <div class="text-center">
                                    <p class="mb-0">¿No tienes cuenta?</p>
                                    <a href="/register" class="btn btn-outline-primary">
                                        <i class="fas fa-user-plus me-2"></i>Regístrate aquí
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Mensajes de alerta -->
                    <div id="alertContainer" class="mt-3"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>
        // Función para mostrar/ocultar contraseña
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Manejar el formulario de login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');
            
            try {
                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        correo: email,
                        contrasena: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar token y usuario
                    localStorage.setItem('token', data.access_token);
                    
                    // Obtener información del usuario del token
                    const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                    localStorage.setItem('user', JSON.stringify({
                        id: payload.sub,
                        correo: payload.correo,
                        rol: payload.idRol
                    }));

                    // Redirigir según el rol
                    switch(payload.idRol) {
                        case 1: // ADMIN
                            window.location.href = '/admin';
                            break;
                        case 2: // VETERINARIO
                            window.location.href = '/veterinario';
                            break;
                        case 3: // USUARIO
                            window.location.href = '/usuario';
                            break;
                        default:
                            window.location.href = '/';
                    }
                } else {
                    // Mostrar error
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            ${data.message || 'Error al iniciar sesión'}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Error de conexión. Por favor, intenta nuevamente.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
            }
        });

        // Verificar si ya está logueado
        window.addEventListener('load', function() {
            const token = localStorage.getItem('token');
            if (token) {
                // Redirigir según el rol guardado
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                switch(user.rol) {
                    case 1: window.location.href = '/admin'; break;
                    case 2: window.location.href = '/veterinario'; break;
                    case 3: window.location.href = '/usuario'; break;
                    default: window.location.href = '/';
                }
            }
        });
    </script>
</body>

</html>
